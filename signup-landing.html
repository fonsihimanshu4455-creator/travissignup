<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

    :root {
      --bg-1: #f4efe7;
      --bg-2: #d8e8ff;
      --card: #ffffffee;
      --text: #1c2230;
      --muted: #5d6678;
      --accent: #f27f3d;
      --accent-dark: #d45f20;
      --border: #d8dde8;
      --ok-bg: #f0fff5;
      --ok-border: #8ad5ac;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #ffffff80 0, transparent 35%),
        radial-gradient(circle at 90% 10%, #ffb3804d 0, transparent 30%),
        linear-gradient(125deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .signup-shell {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid #ffffff;
      border-radius: 24px;
      box-shadow: 0 25px 70px rgba(22, 33, 56, 0.15);
      overflow: hidden;
      animation: fadeSlide 0.7s ease-out;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      padding: 26px 28px 18px;
      background: linear-gradient(90deg, #122442, #203a63);
      color: #ffffff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      width: 56px;
      height: 56px;
      border-radius: 11px;
      background: #ffffff;
      padding: 4px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .brand span {
      font-size: 1.38rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: #ffe8d8;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: clamp(1.5rem, 2.4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .header p {
      margin-top: 7px;
      color: #dce7ff;
      font-size: 0.98rem;
    }

    form {
      padding: 22px 28px 28px;
    }

    .promo-gallery {
      padding: 20px 28px 4px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .promo-card {
      background: linear-gradient(145deg, #ffffff, #f2f6ff);
      border: 1px solid #dfe6f8;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 10px 24px rgba(26, 42, 72, 0.12);
    }

    .promo-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .promo-card p {
      margin-top: 9px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #2c3852;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      font-size: 0.92rem;
    }

    input,
    select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      border-color: #7ba4e9;
      box-shadow: 0 0 0 4px #7ba4e929;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error {
      margin-top: 8px;
      color: #ba2a2a;
      font-size: 0.88rem;
      min-height: 20px;
    }

    .submit-btn {
      margin-top: 4px;
      border: none;
      background: linear-gradient(90deg, var(--accent), #ff9459);
      color: #fff;
      font-weight: 800;
      font-size: 0.98rem;
      border-radius: 12px;
      padding: 13px 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    }

    .submit-btn:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      transform: none;
      box-shadow: none;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 22px rgba(242, 127, 61, 0.32);
    }

    .submit-btn:active {
      transform: translateY(0);
      background: linear-gradient(90deg, var(--accent-dark), #f07f45);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(13, 22, 38, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-box {
      width: min(430px, 100%);
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(17, 38, 21, 0.17);
    }

    .modal-box h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .modal-box p {
      color: #2a4a37;
      line-height: 1.5;
    }

    .close-btn {
      margin-top: 16px;
      border: none;
      background: #1f8f58;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .whatsapp-support {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 25;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: #25d366;
      color: #fff;
      font-weight: 800;
      padding: 12px 16px;
      border-radius: 999px;
      box-shadow: 0 14px 26px rgba(37, 211, 102, 0.36);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .whatsapp-support:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(37, 211, 102, 0.44);
    }

    .whatsapp-support svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex: 0 0 auto;
    }

    @media (max-width: 760px) {
      .promo-gallery {
        padding: 16px 18px 2px;
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      form {
        padding: 18px;
      }

      .header {
        padding: 20px 18px 16px;
      }

      .whatsapp-support {
        right: 12px;
        bottom: 12px;
        font-size: 0.9rem;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <section class="signup-shell">
    <header class="header">
      <div class="brand">
        <img src="./travis777-logo.svg" alt="Travis777 Logo">
        <span>Travis777</span>
      </div>
      <h1>Sign Up</h1>
      <p>Account details fill karein, username/password set karein, aur website select karein.</p>
    </header>

    <section class="promo-gallery" aria-label="Promotional visuals">
      <article class="promo-card">
        <img src="./cash-winning-style.svg" alt="Cash winning style graphic">
        <p>Cash Winning Vibes</p>
      </article>
      <article class="promo-card">
        <img src="./casino-betting-style.svg" alt="Casino betting style graphic">
        <p>Casino Betting Mood</p>
      </article>
    </section>

    <form id="signupForm">
      <div class="grid">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Set username" required>
        </div>

        <div class="field">
          <label for="mobileNumber">Mobile Number</label>
          <input
            id="mobileNumber"
            name="mobileNumber"
            type="tel"
            inputmode="numeric"
            placeholder="Enter 10-digit mobile number"
            required
            pattern="[0-9]{10}"
          >
        </div>

        <div class="field">
          <label for="password">Set Password</label>
          <input id="password" name="password" type="password" placeholder="Set password" required minlength="6">
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" required minlength="6">
        </div>

        <div class="field full">
          <label for="website">Select Website</label>
          <select id="website" name="website" required>
            <option value="">Choose a website</option>
            <option value="99Exch">99Exch</option>
            <option value="Lotus365">Lotus365</option>
            <option value="SkyExchange">SkyExchange</option>
            <option value="Diamond247">Diamond247</option>
          </select>
        </div>

        <div class="field full">
          <button class="submit-btn" type="submit">Create Account</button>
          <p class="error" id="errorText"></p>
        </div>
      </div>
    </form>
  </section>

  <a
    class="whatsapp-support"
    href="https://api.whatsapp.com/send?phone=919999999999&text=Hi%20Support%2C%20mujhe%20help%20chahiye"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="WhatsApp Support"
  >
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <path d="M19.1 17.9c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-.9 1-.2.2-.3.2-.6.1-.3-.1-1.1-.4-2.1-1.3-.8-.7-1.3-1.5-1.5-1.8-.2-.3 0-.4.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.7-1.7-1-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .2.2 2 3.1 4.8 4.3.7.3 1.2.5 1.6.7.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.4.2-.7.2-1.3.1-1.4-.1-.1-.3-.2-.6-.4z"/>
      <path d="M16 3.2c-7 0-12.6 5.6-12.6 12.6 0 2.2.6 4.4 1.7 6.3L3.2 29l6.9-1.8c1.8 1 3.8 1.5 5.9 1.5h.1c6.9 0 12.6-5.6 12.6-12.6S23 3.2 16 3.2zm0 23.3h-.1c-1.8 0-3.7-.5-5.2-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4c-1-1.6-1.6-3.5-1.6-5.4 0-5.8 4.8-10.6 10.6-10.6s10.6 4.8 10.6 10.6-4.8 10.3-10.6 10.3z"/>
    </svg>
    WhatsApp Support
  </a>

  <div class="modal" id="successModal" aria-hidden="true">
    <div class="modal-box">
      <h3>Signup Complete</h3>
      <p>Aapki ID password aapko WhatsApp kar diya gaya hai.</p>
      <button class="close-btn" id="closeModalBtn" type="button">OK</button>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8QOWBP8xj-5G91rqdVRvu-E4xmZZbpVFQ0r5ZQiE1naLSvjHEj84IIIJighcxstnbOA/exec";

    const form = document.getElementById("signupForm");
    const submitBtn = form.querySelector(".submit-btn");
    const username = document.getElementById("username");
    const mobileNumber = document.getElementById("mobileNumber");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const website = document.getElementById("website");
    const errorText = document.getElementById("errorText");
    const successModal = document.getElementById("successModal");
    const closeModalBtn = document.getElementById("closeModalBtn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorText.textContent = "";

      if (password.value !== confirmPassword.value) {
        errorText.textContent = "Password aur confirm password same hone chahiye.";
        confirmPassword.focus();
        return;
      }

      const mobile = mobileNumber.value.trim();
      if (!/^[0-9]{10}$/.test(mobile)) {
        errorText.textContent = "Mobile number 10 digit ka hona chahiye.";
        mobileNumber.focus();
        return;
      }

      const payload = {
        username: username.value.trim(),
        mobileNumber: mobile,
        password: password.value,
        website: website.value,
        submittedAt: new Date().toISOString()
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload)
        });

        successModal.classList.add("show");
        successModal.setAttribute("aria-hidden", "false");
        form.reset();
      } catch (error) {
        errorText.textContent = "Signup save nahi hua. Dobara try karein.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });

    closeModalBtn.addEventListener("click", () => {
      successModal.classList.remove("show");
      successModal.setAttribute("aria-hidden", "true");
    });

    successModal.addEventListener("click", (event) => {
      if (event.target === successModal) {
        successModal.classList.remove("show");
        successModal.setAttribute("aria-hidden", "true");
      }
    });
  </script>
</body>
</html>
